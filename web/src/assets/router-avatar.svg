<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#e8f1fb"/>
  <!-- Antenna center -->
  <rect x="29" y="6" width="6" height="14" rx="3" fill="#1258b0"/>
  <circle cx="32" cy="6" r="3" fill="#3b9eff"/>
  <!-- Router body (vertical box) -->
  <rect x="16" y="18" width="32" height="34" rx="5" fill="#1a6fd4"/>
  <rect x="16" y="18" width="32" height="34" rx="5" stroke="#1258b0" stroke-width="1"/>
  <!-- Highlight stripe on left -->
  <rect x="16" y="18" width="6" height="34" rx="5" fill="#3b9eff" opacity="0.4"/>
  <!-- LED strip (vertical row) -->
  <circle cx="32" cy="26" r="3" fill="#6effc0"/>
  <circle cx="32" cy="34" r="3" fill="#a8d8ff"/>
  <circle cx="32" cy="42" r="3" fill="#ffc870"/>
  <!-- LED glow effects -->
  <circle cx="32" cy="26" r="4.5" fill="#6effc0" opacity="0.25"/>
  <circle cx="32" cy="34" r="4.5" fill="#a8d8ff" opacity="0.25"/>
  <circle cx="32" cy="42" r="4.5" fill="#ffc870" opacity="0.25"/>
  <!-- Bottom port slot -->
  <rect x="26" y="48" width="12" height="2.5" rx="1.2" fill="#9fc6f0" opacity="0.9"/>
  <!-- Ventilation slits on right side -->
  <rect x="40" y="24" width="5" height="1.5" rx="0.7" fill="#1258b0" opacity="0.6"/>
  <rect x="40" y="28" width="5" height="1.5" rx="0.7" fill="#1258b0" opacity="0.6"/>
  <rect x="40" y="32" width="5" height="1.5" rx="0.7" fill="#1258b0" opacity="0.6"/>
</svg>
